<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Comp A: "Beacon" — lightbulb antenna, warm & bright helper -->
  <defs>
    <linearGradient id="beaconBodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9dc4f8"/>
      <stop offset="100%" stop-color="#89b4fa"/>
    </linearGradient>
    <linearGradient id="beaconBulbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <filter id="beaconGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="50" cy="92" rx="22" ry="4" fill="#181825" opacity="0.4"/>

  <!-- Legs -->
  <rect x="37" y="78" width="8" height="10" rx="3" fill="#7196cf"/>
  <rect x="55" y="78" width="8" height="10" rx="3" fill="#7196cf"/>

  <!-- Body -->
  <rect x="30" y="48" width="40" height="34" rx="8" fill="url(#beaconBodyGrad)"/>
  <!-- Body highlight -->
  <rect x="34" y="50" width="14" height="4" rx="2" fill="#a8ccfc" opacity="0.5"/>

  <!-- Chest panel — subtle lightbulb emblem -->
  <rect x="40" y="58" width="20" height="16" rx="4" fill="#6a9fe0" opacity="0.4"/>
  <circle cx="50" cy="64" r="4" fill="#fde68a" opacity="0.6"/>
  <rect x="48.5" y="67" width="3" height="3" rx="1" fill="#fde68a" opacity="0.4"/>

  <!-- Arms -->
  <rect x="22" y="54" width="10" height="6" rx="3" fill="#89b4fa"/>
  <rect x="68" y="54" width="10" height="6" rx="3" fill="#89b4fa"/>
  <!-- Hands -->
  <circle cx="23" cy="57" r="3.5" fill="#9dc4f8"/>
  <circle cx="77" cy="57" r="3.5" fill="#9dc4f8"/>

  <!-- Head -->
  <rect x="32" y="24" width="36" height="28" rx="10" fill="url(#beaconBodyGrad)"/>
  <!-- Head highlight -->
  <rect x="36" y="26" width="12" height="4" rx="2" fill="#a8ccfc" opacity="0.5"/>

  <!-- Antenna stalk -->
  <rect x="48" y="14" width="4" height="12" rx="2" fill="#7196cf"/>

  <!-- Lightbulb -->
  <circle cx="50" cy="11" r="6" fill="url(#beaconBulbGrad)" filter="url(#beaconGlow)"/>
  <rect x="48" y="14" width="4" height="2" rx="1" fill="#d4a017"/>

  <!-- Eyes — soft open, friendly -->
  <ellipse cx="42" cy="36" rx="4" ry="4.5" fill="#1e1e2e"/>
  <circle cx="43" cy="35" r="1.5" fill="#cdd6f4"/>
  <ellipse cx="58" cy="36" rx="4" ry="4.5" fill="#1e1e2e"/>
  <circle cx="59" cy="35" r="1.5" fill="#cdd6f4"/>

  <!-- Mouth — gentle smile -->
  <path d="M44 43 Q50 47 56 43" fill="none" stroke="#1e1e2e" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Blush -->
  <circle cx="37" cy="41" r="3" fill="#f472b6" opacity="0.15"/>
  <circle cx="63" cy="41" r="3" fill="#f472b6" opacity="0.15"/>
</svg>