<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Pip: SLEEPING — closed eyes, Zzz, dim core, breathing animation -->
  <defs>
    <linearGradient id="pipSleepBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9aa5c4"/>
      <stop offset="100%" stop-color="#6c7086"/>
    </linearGradient>
    <radialGradient id="pipSleepCore" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#a6adc8"/>
      <stop offset="100%" stop-color="#6c7086" stop-opacity="0.4"/>
    </radialGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="50" cy="92" rx="18" ry="3.5" fill="#181825" opacity="0.4"/>

  <!-- Legs — relaxed -->
  <rect x="39" y="80" width="7" height="8" rx="3" fill="#585b70"/>
  <rect x="54" y="80" width="7" height="8" rx="3" fill="#585b70"/>

  <!-- Body -->
  <rect x="33" y="55" width="34" height="28" rx="12" fill="url(#pipSleepBody)"/>
  <rect x="37" y="57" width="10" height="3" rx="1.5" fill="#a6adc8" opacity="0.3"/>

  <!-- Core — dim -->
  <circle cx="50" cy="68" r="6" fill="url(#pipSleepCore)"/>
  <circle cx="50" cy="68" r="3" fill="#bac2de" opacity="0.3"/>

  <!-- Arms — drooped down -->
  <ellipse cx="27" cy="67" rx="5" ry="3.5" fill="#6c7086"/>
  <ellipse cx="73" cy="67" rx="5" ry="3.5" fill="#6c7086"/>
  <circle cx="23" cy="67" r="3" fill="#7f849c"/>
  <circle cx="77" cy="67" r="3" fill="#7f849c"/>

  <!-- Head — slightly tilted -->
  <g transform="rotate(-3 50 36)">
    <ellipse cx="50" cy="36" rx="22" ry="22" fill="url(#pipSleepBody)"/>
    <ellipse cx="43" cy="22" rx="10" ry="5" fill="#a6adc8" opacity="0.2"/>

    <!-- Antenna — dim -->
    <rect x="49" y="12" width="2" height="5" rx="1" fill="#585b70"/>
    <circle cx="50" cy="10" r="2.5" fill="#6c7086"/>
    <circle cx="50" cy="10" r="1.2" fill="#7f849c" opacity="0.4"/>

    <!-- Eyes — closed arcs (matching existing mascot pattern) -->
    <path d="M36 36 Q41 39 46 36" fill="none" stroke="#313244" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M54 36 Q59 39 64 36" fill="none" stroke="#313244" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Mouth — peaceful line -->
    <path d="M46 44 Q50 46 54 44" fill="none" stroke="#313244" stroke-width="1" stroke-linecap="round"/>

    <!-- Blush — faint -->
    <circle cx="34" cy="41" r="3.5" fill="#f472b6" opacity="0.08"/>
    <circle cx="66" cy="41" r="3.5" fill="#f472b6" opacity="0.08"/>
  </g>

  <!-- Zzz — staggered, matching SleepingZzz pattern -->
  <text font-family="monospace" fill="#6c7086" opacity="0.8">
    <tspan x="68" y="22" font-size="11">z</tspan>
  </text>
  <text font-family="monospace" fill="#585b70" opacity="0.7">
    <tspan x="74" y="15" font-size="9">z</tspan>
  </text>
  <text font-family="monospace" fill="#45475a" opacity="0.6">
    <tspan x="79" y="9" font-size="7">z</tspan>
  </text>
</svg>