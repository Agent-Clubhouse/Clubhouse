<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Pip 32px avatar: Head only, simplified for chat message avatar -->
  <defs>
    <linearGradient id="av32Head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b4d0fa"/>
      <stop offset="100%" stop-color="#89b4fa"/>
    </linearGradient>
  </defs>

  <!-- Background circle (optional, for avatar ring context) -->
  <circle cx="16" cy="17" r="14" fill="url(#av32Head)"/>

  <!-- Head highlight -->
  <ellipse cx="13" cy="10" rx="5" ry="3" fill="#c8dffc" opacity="0.35"/>

  <!-- Antenna -->
  <rect x="15" y="2" width="2" height="3" rx="1" fill="#6a9fe0"/>
  <circle cx="16" cy="1.5" r="1.8" fill="#89b4fa"/>
  <circle cx="16" cy="1.5" r="0.8" fill="#cdd6f4" opacity="0.7"/>

  <!-- Eyes -->
  <circle cx="12" cy="16" r="3" fill="#1e1e2e"/>
  <circle cx="12.8" cy="15.2" r="1.2" fill="#cdd6f4"/>
  <circle cx="20" cy="16" r="3" fill="#1e1e2e"/>
  <circle cx="20.8" cy="15.2" r="1.2" fill="#cdd6f4"/>

  <!-- Mouth -->
  <path d="M13 22 Q16 24.5 19 22" fill="none" stroke="#1e1e2e" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Blush -->
  <circle cx="9" cy="19.5" r="2" fill="#f472b6" opacity="0.12"/>
  <circle cx="23" cy="19.5" r="2" fill="#f472b6" opacity="0.12"/>
</svg>