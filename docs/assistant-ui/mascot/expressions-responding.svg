<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Pip: RESPONDING — mouth open, gesturing, bright core, green accent -->
  <defs>
    <linearGradient id="pipRespondBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b4d0fa"/>
      <stop offset="100%" stop-color="#89b4fa"/>
    </linearGradient>
    <radialGradient id="pipRespondCore" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="60%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="50" cy="92" rx="18" ry="3.5" fill="#181825" opacity="0.4"/>

  <!-- Legs -->
  <rect x="39" y="80" width="7" height="8" rx="3" fill="#6a9fe0"/>
  <rect x="54" y="80" width="7" height="8" rx="3" fill="#6a9fe0"/>

  <!-- Body -->
  <rect x="33" y="55" width="34" height="28" rx="12" fill="url(#pipRespondBody)"/>
  <rect x="37" y="57" width="10" height="3" rx="1.5" fill="#c8dffc" opacity="0.5"/>

  <!-- Core — green glow (responding/active) -->
  <circle cx="50" cy="68" r="6" fill="url(#pipRespondCore)"/>
  <circle cx="50" cy="68" r="3" fill="#dcfce7" opacity="0.9"/>

  <!-- Arms — one gesturing outward (explaining) -->
  <ellipse cx="27" cy="62" rx="5" ry="3.5" fill="#89b4fa"/>
  <circle cx="23" cy="62" r="3" fill="#a4c8fc"/>
  <!-- Right arm extended, waving/pointing -->
  <ellipse cx="76" cy="56" rx="6" ry="3.5" fill="#89b4fa" transform="rotate(-15 76 56)"/>
  <circle cx="81" cy="54" r="3" fill="#a4c8fc"/>

  <!-- Head -->
  <ellipse cx="50" cy="36" rx="22" ry="22" fill="url(#pipRespondBody)"/>
  <ellipse cx="43" cy="22" rx="10" ry="5" fill="#c8dffc" opacity="0.35"/>

  <!-- Antenna — green-tinted while responding -->
  <rect x="49" y="12" width="2" height="5" rx="1" fill="#6a9fe0"/>
  <circle cx="50" cy="10" r="2.5" fill="#22c55e"/>
  <circle cx="50" cy="10" r="1.2" fill="#bbf7d0" opacity="0.8"/>

  <!-- Eyes — bright, engaged -->
  <circle cx="41" cy="35" r="5.5" fill="#1e1e2e"/>
  <circle cx="42.5" cy="33.5" r="2.5" fill="#cdd6f4"/>
  <circle cx="40" cy="35.5" r="1" fill="#22c55e" opacity="0.4"/>
  <circle cx="59" cy="35" r="5.5" fill="#1e1e2e"/>
  <circle cx="60.5" cy="33.5" r="2.5" fill="#cdd6f4"/>
  <circle cx="58" cy="35.5" r="1" fill="#22c55e" opacity="0.4"/>

  <!-- Mouth — open, talking -->
  <ellipse cx="50" cy="44" rx="4" ry="3" fill="#1e1e2e"/>
  <ellipse cx="50" cy="43.5" rx="2.5" ry="1.5" fill="#313244"/>

  <!-- Blush — warm -->
  <circle cx="34" cy="41" r="3.5" fill="#f472b6" opacity="0.15"/>
  <circle cx="66" cy="41" r="3.5" fill="#f472b6" opacity="0.15"/>

  <!-- Speech lines — small arcs emanating -->
  <path d="M78 36 Q82 34 80 30" fill="none" stroke="#22c55e" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <path d="M80 40 Q85 38 83 34" fill="none" stroke="#22c55e" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
</svg>