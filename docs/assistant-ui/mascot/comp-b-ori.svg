<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Comp B: "Ori" — question-mark crest, curious explorer -->
  <defs>
    <linearGradient id="oriBodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8ccfc"/>
      <stop offset="100%" stop-color="#7196cf"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="50" cy="92" rx="20" ry="4" fill="#181825" opacity="0.4"/>

  <!-- Legs -->
  <rect x="38" y="79" width="7" height="9" rx="3" fill="#5e82b3"/>
  <rect x="55" y="79" width="7" height="9" rx="3" fill="#5e82b3"/>

  <!-- Body — rounder, more compact -->
  <rect x="32" y="50" width="36" height="32" rx="10" fill="url(#oriBodyGrad)"/>
  <!-- Body highlight -->
  <rect x="36" y="52" width="12" height="3" rx="1.5" fill="#b8d4fc" opacity="0.5"/>

  <!-- Chest — question mark emblem -->
  <rect x="41" y="60" width="18" height="14" rx="4" fill="#5478a8" opacity="0.35"/>
  <text x="50" y="72" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#cdd6f4" opacity="0.7">?</text>

  <!-- Arms — slightly angled outward, curious pose -->
  <rect x="22" y="52" width="12" height="5.5" rx="2.5" fill="#7196cf" transform="rotate(-8 28 55)"/>
  <rect x="66" y="52" width="12" height="5.5" rx="2.5" fill="#7196cf" transform="rotate(8 72 55)"/>
  <!-- Hands -->
  <circle cx="22" cy="54" r="3.5" fill="#8ab0e0"/>
  <circle cx="78" cy="54" r="3.5" fill="#8ab0e0"/>

  <!-- Head — dome-shaped, larger relative to body -->
  <ellipse cx="50" cy="34" rx="20" ry="18" fill="url(#oriBodyGrad)"/>
  <!-- Head highlight -->
  <ellipse cx="44" cy="24" rx="8" ry="3" fill="#b8d4fc" opacity="0.4"/>

  <!-- Ear nubs -->
  <ellipse cx="31" cy="30" rx="4" ry="5" fill="#7196cf"/>
  <ellipse cx="69" cy="30" rx="4" ry="5" fill="#7196cf"/>

  <!-- Question-mark crest (top of head) -->
  <path d="M46 16 Q46 10 50 10 Q55 10 55 14 Q55 17 51 18" fill="none" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="51" cy="21" r="1.5" fill="#f5a623"/>

  <!-- Eyes — large, curious, wide open -->
  <ellipse cx="42" cy="34" rx="5" ry="5.5" fill="#1e1e2e"/>
  <circle cx="43.5" cy="33" r="2" fill="#cdd6f4"/>
  <circle cx="42" cy="35" r="0.8" fill="#89b4fa" opacity="0.5"/>
  <ellipse cx="58" cy="34" rx="5" ry="5.5" fill="#1e1e2e"/>
  <circle cx="59.5" cy="33" r="2" fill="#cdd6f4"/>
  <circle cx="58" cy="35" r="0.8" fill="#89b4fa" opacity="0.5"/>

  <!-- Eyebrows — slightly raised, inquisitive -->
  <path d="M37 27 Q42 25 47 27" fill="none" stroke="#5478a8" stroke-width="1" stroke-linecap="round"/>
  <path d="M53 27 Q58 25 63 27" fill="none" stroke="#5478a8" stroke-width="1" stroke-linecap="round"/>

  <!-- Mouth — small open "o", curious -->
  <ellipse cx="50" cy="42" rx="2.5" ry="2" fill="#1e1e2e"/>

  <!-- Blush -->
  <circle cx="35" cy="39" r="3" fill="#f472b6" opacity="0.15"/>
  <circle cx="65" cy="39" r="3" fill="#f472b6" opacity="0.15"/>
</svg>